all: false
recursive: true
with-expecter: true
mockname: "{{.InterfaceName}}Mock"
filename: "{{.MockName}}.go"
outpkg: "{{.PackageName}}mocks"
dir: ./mocks

resolve-type-alias: false
disable-version-string: true
issue-845-fix: true

packages:
  delivery-service/internal/core/ports:
    config:
      dir: ./mocks/core/portsmocks
    interfaces:
      UnitOfWork:
      UnitOfWorkFactory:
      CourierRepository:
      OrderRepository:
      GeoClient:

  delivery-service/internal/core/domain/services:
    config:
      dir: ./mocks/core/domain/servicesmocks
    interfaces:
      OrderDispatcherService:

  delivery-service/internal/core/application/usecases/commands:
    config:
      dir: ./mocks/core/application/usecases/commandsmocks
    interfaces:
      AssignOrdersCommandHandler:
      CreateOrderCommandHandler:
      MoveCouriersCommandHandler:

  delivery-service/internal/core/application/usecases/queries:
    config:
      dir: ./mocks/core/application/usecases/queriesmocks
    interfaces:
      GetAllCouriersQueryHandler:
      GetNotCompletedOrdersQueryHandler: